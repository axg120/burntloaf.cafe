<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Token - Burnt Loaf Cafe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #8b6f47;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .token-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            min-height: 100px;
        }

        button {
            background: #8b6f47;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background: #6d5835;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔔 Device Token</h1>
    <p class="subtitle">Your Firebase device token</p>

    <div class="token-box" id="tokenBox">Loading...</div>

    <button onclick="copyToken()">Copy Token</button>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getMessaging, getToken } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging.js';

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(err => {
            console.log('Service worker registration failed:', err);
        });
    }

    const firebaseConfig = {
        apiKey: "AIzaSyAklt2oAC5-LVYNJH0fVCaI39BlLwtLwNM",
        authDomain: "burntloafcafe-b626f.firebaseapp.com",
        projectId: "burntloafcafe-b626f",
        storageBucket: "burntloafcafe-b626f.firebasestorage.app",
        messagingSenderId: "268363899230",
        appId: "1:268363899230:web:7e53683897f476e6872fcf"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    getToken(messaging, {
        vapidKey: " BKe1tD8hKbubaPhPZHZjHGoM6KC4Z3eLjr8rWuzzjP8ppgPv5SByMSJjT5Ft6BsMd2F5nYtgsmcnjz25fNfWmYU "
    }).then(token => {
        document.getElementById('tokenBox').textContent = token;
    }).catch(error => {
        document.getElementById('tokenBox').textContent = 'Error: ' + error.message;
    });

    window.copyToken = function() {
        const token = document.getElementById('tokenBox').textContent;
        navigator.clipboard.writeText(token);
    };
</script>
</body>
</html>
