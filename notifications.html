<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burnt Loaf Cafe Notifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #8b6f47;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .token-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            min-height: 100px;
        }

        button {
            background: #8b6f47;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #6d5835;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔔 Device Token</h1>
        <p class="subtitle">Your Firebase device token</p>

        <div id="status" class="status"></div>

        <button id="enableBtn" onclick="enableNotifications()">Enable Notifications</button>

        <div id="tokenContainer" style="display: none;">
            <p style="margin-top: 20px; color: #666; font-size: 14px;">Your device token:</p>
            <div class="token-box" id="tokenBox"></div>

            <div class="button-group">
                <button onclick="copyToken()">Copy Token</button>
                <button onclick="resetToken()" style="background: #999;">Reset</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getMessaging, getToken } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging.js';

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(err => {
                console.log('Service worker registration failed:', err);
            });
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAklt2oAC5-LVYNJH0fVCaI39BlLwtLwNM",
            authDomain: "burntloafcafe-b626f.firebaseapp.com",
            projectId: "burntloafcafe-b626f",
            storageBucket: "burntloafcafe-b626f.firebasestorage.app",
            messagingSenderId: "268363899230",
            appId: "1:268363899230:web:7e53683897f476e6872fcf"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        window.enableNotifications = async function() {
            try {
                const permission = await Notification.requestPermission();

                if (permission !== 'granted') {
                    showStatus('Notification permission denied', 'error');
                    return;
                }

                showStatus('Getting device token...', 'info');

                const token = await getToken(messaging, {
                    vapidKey: " BKe1tD8hKbubaPhPZHZjHGoM6KC4Z3eLjr8rWuzzjP8ppgPv5SByMSJjT5Ft6BsMd2F5nYtgsmcnjz25fNfWmYU "
                });

                if (token) {
                    document.getElementById('tokenBox').textContent = token;
                    document.getElementById('tokenContainer').style.display = 'block';
                    document.getElementById('enableBtn').style.display = 'none';
                    showStatus('✓ Device token obtained successfully!', 'success');
                } else {
                    showStatus('Failed to get device token', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Error: ' + error.message, 'error');
            }
        };

        window.copyToken = function() {
            const token = document.getElementById('tokenBox').textContent;
            navigator.clipboard.writeText(token).then(() => {
                showStatus('Token copied to clipboard!', 'success');
            });
        };

        window.resetToken = function() {
            document.getElementById('tokenContainer').style.display = 'none';
            document.getElementById('enableBtn').style.display = 'block';
            document.getElementById('status').className = 'status';
            document.getElementById('status').textContent = '';
        };

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
    </script>
</body>
</html>
